<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Console</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0B0B0C; overflow: hidden; width: 100vw; height: 100vh; }
  #screen { width: 100%; height: 100%; }
  #status { position: fixed; top: 8px; right: 8px; color: #E57000; font: 12px monospace; z-index: 99; }
</style>
</head>
<body>
<div id="screen"></div>
<div id="status">Connecting...</div>
<script type="module">
import RFB from './core/rfb.js';

const params = new URLSearchParams(window.location.search);
const host = params.get('host') || '127.0.0.1';
const port = params.get('port');
const path = params.get('path') || '';
const encrypt = params.get('encrypt') === '1';
const password = params.get('password') || '';

const scheme = encrypt ? 'wss' : 'ws';
const wsUrl = `${scheme}://${host}:${port}/${path}`;

document.getElementById('status').textContent = 'Connecting to ' + host + ':' + port;

try {
  const rfb = new RFB(document.getElementById('screen'), wsUrl, {
    credentials: { password: password },
    wsProtocols: ['binary'],
  });
  rfb.viewOnly = false;
  rfb.scaleViewport = true;
  rfb.resizeSession = true;
  rfb.showDotCursor = true;

  rfb.addEventListener('connect', () => {
    document.getElementById('status').textContent = 'Connected';
    setTimeout(() => { document.getElementById('status').style.display = 'none'; }, 2000);
  });
  rfb.addEventListener('disconnect', (e) => {
    document.getElementById('status').textContent = 'Disconnected';
    document.getElementById('status').style.display = 'block';
  });
} catch (e) {
  document.getElementById('status').textContent = 'Error: ' + e.message;
}
</script>
</body>
</html>
