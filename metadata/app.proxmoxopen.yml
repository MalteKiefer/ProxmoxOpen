AutoName: ProxMoxOpen
Summary: Open, secure, F-Droid-first Android client for Proxmox VE.
Description: |
    ProxMoxOpen is a native Android client for Proxmox VE. It pins
    certificates on first use, keeps all credentials in the Android
    Keystore, ships zero trackers, and aims to meet F-Droid's main-repo
    reproducibility requirements from day one.

    Features:
    - Multi-server management with fast switching
    - Cluster, node, VM and container dashboards with live charts
    - Power actions for VMs and containers
    - API-token, PAM and PVE authentication with TOTP two-factor
    - Material 3 with dynamic color on Android 12+

