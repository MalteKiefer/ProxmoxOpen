name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, Detekt & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1  # v4.4.4

      - name: Detekt
        run: ./gradlew detekt --no-daemon

      - name: Verify bundled noVNC version
        run: |
          ver=$(cat app/src/main/assets/novnc/VERSION)
          echo "noVNC bundle: $ver"
          # Floor: noVNC 1.5.0+
          if echo "$ver" | grep -qE 'v(0\.|1\.[0-4]\.)'; then
            echo "noVNC bundle older than 1.5.0; bump required"
            exit 1
          fi

      - name: Lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest :domain:test --no-daemon

  build:
    name: Build Debug APK
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1  # v4.4.4

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
