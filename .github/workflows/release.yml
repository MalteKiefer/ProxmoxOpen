name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - id: version
        name: Extract version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1  # v4.4.4

      - name: Detekt + Lint
        run: ./gradlew detekt :app:lintDebug --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest :domain:test --no-daemon

  build-android:
    name: Android (APK + AAB)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1  # v4.4.4

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      - name: Create keystore properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build AAB
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Rename artifacts
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/*.apk \
             "release-assets/ProxMoxOpen-${VERSION}.apk" 2>/dev/null || true
          # AAB might be in different path
          find app/build/outputs/bundle -name "*.aab" -exec cp {} \
             "release-assets/ProxMoxOpen-${VERSION}.aab" \; 2>/dev/null || true

      - name: Wipe signing material
        if: always()
        run: |
          rm -f app/keystore.jks keystore.properties

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: android-apk
          path: release-assets/*.apk

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: android-aab
          path: release-assets/*.aab
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: [preflight, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artifacts/

      - name: Collect release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets
          cp artifacts/android-apk/*.apk release-assets/ 2>/dev/null || true
          cp artifacts/android-aab/*.aab release-assets/ 2>/dev/null || true
          ls -lh release-assets/

      - name: Generate release notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cat > release-notes.md <<NOTES
          ## ProxMoxOpen ${VERSION}

          Native Android client for Proxmox VE.

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android (APK) | \`ProxMoxOpen-${VERSION}.apk\` |
          | Android (AAB) | \`ProxMoxOpen-${VERSION}.aab\` |

          ---
          **License:** GPL-3.0 | **F-Droid:** Coming soon
          NOTES
          sed -i 's/^          //' release-notes.md

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ProxMoxOpen ${{ needs.preflight.outputs.version }}
          draft: false
          body_path: release-notes.md
          files: release-assets/*
